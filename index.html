<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX-Unified Dynamics | 全息战术沙盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; }
        .tab-btn { padding: 10px 20px; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; transition: 0.3s; background: #161b22; }
        .tab-btn.active { background: #238636; color: white; border-color: #2ea043; font-weight: bold; }
        .tab-btn:hover:not(.active) { background: #21262d; }
        .long { color: #3fb950; font-weight: bold; }
        .short { color: #f85149; font-weight: bold; }
        .neutral { color: #8b949e; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background-color: #161b22; color: #8b949e; font-weight: normal; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        tr:hover { background-color: #1f242c; }
        .math-box { background: #010409; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; font-family: monospace; font-size: 1rem; }
        
        #chart-container { height: 400px; width: 100%; }
        select { background-color: #010409; color: #c9d1d9; border: 1px solid #30363d; padding: 4px 8px; border-radius: 4px; outline: none; cursor: pointer; }
        
        /* 🚀 轮动矩阵专属样式 */
        #rotation-matrix::-webkit-scrollbar { height: 8px; }
        #rotation-matrix::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .rotation-card { min-width: 260px; background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 12px; scroll-snap-align: start; flex-shrink: 0; }
        
        .badge-6 { background: rgba(63, 185, 80, 0.2); color: #3fb950; border: 1px solid rgba(63, 185, 80, 0.4); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-block; margin: 2px; }
        .badge-5 { background: rgba(63, 185, 80, 0.1); color: #7ee787; border: 1px solid rgba(63, 185, 80, 0.2); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; display: inline-block; margin: 2px; }
        .badge-n6 { background: rgba(248, 81, 73, 0.2); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.4); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-block; margin: 2px; }
        .badge-n5 { background: rgba(248, 81, 73, 0.1); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.2); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; display: inline-block; margin: 2px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="border-b border-[#30363d] pb-4 mb-6">
            <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                🛸 MX-Unified Dynamics <span class="text-xs bg-[#238636] px-2 py-1 rounded text-white font-bold tracking-widest">LIVE</span>
            </h1>
            <div class="flex flex-col md:flex-row gap-4 mt-4 bg-[#161b22] p-3 rounded border border-[#30363d]">
                <div id="time-1d" class="text-xs">🌞 1D 同步: <span class="text-[#8b949e]">Scanning...</span></div>
                <div id="time-1h" class="text-xs md:border-l md:border-[#30363d] md:pl-4">⚡ 1H 同步: <span class="text-[#8b949e]">Scanning...</span></div>
            </div>
        </div>

        <div class="flex gap-4 mb-6">
            <button id="btn-1d" class="tab-btn active" onclick="loadData('1d')">🌞 1D Macro Pool</button>
            <button id="btn-1h" class="tab-btn" onclick="loadData('1h')">⚡ 1H Intraday Pool</button>
        </div>

        <div class="mb-6 border border-[#30363d] rounded-lg bg-[#161b22] shadow-2xl p-4 hidden" id="rotation-container">
            <h2 class="text-lg font-bold text-white flex items-center gap-2 mb-4">
                🔥 资金轮动矩阵 (Sector Rotation Map)
            </h2>
            <div id="rotation-matrix" class="flex overflow-x-auto gap-4 pb-2 snap-x">
                </div>
        </div>

        <div class="mb-6 border border-[#30363d] rounded-lg bg-[#161b22] shadow-2xl p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                    📈 单兵动能推演 (Net Score History)
                </h2>
                <select id="ticker-select" onchange="renderChart(this.value)">
                    <option value="">Loading Signals...</option>
                </select>
            </div>
            <div id="chart-container"></div>
        </div>

        <div class="overflow-x-auto border border-[#30363d] rounded-lg bg-[#161b22] shadow-2xl">
            <table id="data-table">
                <thead id="table-head"></thead>
                <tbody id="table-body">
                    <tr><td colspan="6" class="text-center py-8">📡 Connecting to global edge network...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let chart = null;
        let histogramSeries = null;
        let currentHistoryData = [];

        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { type: 'solid', color: '#161b22' }, textColor: '#8b949e' },
                grid: { vertLines: { color: '#30363d' }, horzLines: { color: '#30363d' } },
                timeScale: { timeVisible: true, borderColor: '#30363d' },
                rightPriceScale: { borderColor: '#30363d' },
            });

            histogramSeries = chart.addHistogramSeries({
                base: 0, 
                priceFormat: { type: 'volume' },
            });

            window.addEventListener('resize', () => {
                chart.resize(container.clientWidth, 400);
            });
        }

        // 🚀 渲染资金轮动矩阵
        function renderRotationMatrix() {
            const container = document.getElementById('rotation-matrix');
            const wrapper = document.getElementById('rotation-container');
            container.innerHTML = '';
            
            if (currentHistoryData.length === 0) {
                wrapper.classList.add('hidden');
                return;
            }
            wrapper.classList.remove('hidden');

            currentHistoryData.forEach(snap => {
                const rawTime = snap.timestamp.split(' ')[0]; // 取日期部分
                
                // 动态过滤
                const longs6 = snap.signals.filter(s => s.net_score >= 6).map(s => s.ticker);
                const longs5 = snap.signals.filter(s => s.net_score === 5).map(s => s.ticker);
                const shorts6 = snap.signals.filter(s => s.net_score <= -6).map(s => s.ticker);
                const shorts5 = snap.signals.filter(s => s.net_score === -5).map(s => s.ticker);
                
                let html = `<div class="rotation-card">`;
                html += `<div class="text-[#c9d1d9] border-b border-[#30363d] pb-2 mb-3 font-bold tracking-wider">📅 ${rawTime}</div>`;
                
                // 多头阵营
                html += `<div class="mb-3"><div class="text-xs text-[#8b949e] mb-1 uppercase tracking-widest">Bullish Vanguard</div>`;
                if (longs6.length > 0 || longs5.length > 0) {
                    html += longs6.map(t => `<span class="badge-6" title="+6 Full Consensus">${t}</span>`).join('');
                    html += longs5.map(t => `<span class="badge-5" title="+5 Strong Consensus">${t}</span>`).join('');
                } else {
                    html += `<span class="text-xs text-[#484f58]">No targets</span>`;
                }
                html += `</div>`;

                // 空头阵营
                html += `<div><div class="text-xs text-[#8b949e] mb-1 uppercase tracking-widest">Bearish Targets</div>`;
                if (shorts6.length > 0 || shorts5.length > 0) {
                    html += shorts6.map(t => `<span class="badge-n6" title="-6 Full Short">${t}</span>`).join('');
                    html += shorts5.map(t => `<span class="badge-n5" title="-5 Strong Short">${t}</span>`).join('');
                } else {
                    html += `<span class="text-xs text-[#484f58]">No targets</span>`;
                }
                html += `</div></div>`;
                container.innerHTML += html;
            });

            setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
        }

        // 📈 渲染单一个股的动能历史
        function renderChart(ticker) {
            if (!ticker || currentHistoryData.length === 0) return;

            const chartData = [];
            currentHistoryData.forEach(snap => {
                const sig = snap.signals.find(s => s.ticker === ticker);
                if (sig) {
                    const score = sig.net_score;
                    const color = score > 0 ? 'rgba(63, 185, 80, 0.8)' : (score < 0 ? 'rgba(248, 81, 73, 0.8)' : 'rgba(139, 148, 158, 0.8)');
                    const dateStr = snap.timestamp.replace(' ', 'T') + 'Z';
                    const unixTime = Math.floor(new Date(dateStr).getTime() / 1000);
                    
                    if (!chartData.find(d => d.time === unixTime)) {
                        chartData.push({ time: unixTime, value: score, color: color });
                    }
                }
            });

            chartData.sort((a, b) => a.time - b.time);
            histogramSeries.setData(chartData);
            chart.timeScale().fitContent();
        }

        async function fetchGlobalTimestamps() {
            const bust = new Date().getTime();
            ['1d', '1h'].forEach(async (tf) => {
                try {
                    const res = await fetch(`consensus_${tf}.json?t=${bust}`);
                    if (res.ok) {
                        const data = await res.json();
                        const timeEl = document.getElementById(`time-${tf}`);
                        if(timeEl) {
                            timeEl.innerHTML = `${tf === '1d' ? '🌞 1D' : '⚡ 1H'} 同步: <strong class="text-[#58a6ff]">${data.update_time || 'N/A'}</strong>`;
                        }
                    }
                } catch(e) {}
            });
        }

        function cleanStatus(val) {
            if (!val || val.includes('✅')) return '<span class="text-[#3fb950]">OK</span>';
            const match = val.match(/XM(\d)/);
            if (match) {
                const code = match[0];
                let label = '';
                if (code === 'XM2') label = ' (Momentum)';
                else if (code === 'XM3') label = ' (Holding)';
                else if (code === 'XM4') label = ' (Force)';
                return `<span class="short">${code}${label}</span>`;
            }
            return val;
        }

        async function loadData(timeframe) {
            document.getElementById('btn-1d').classList.toggle('active', timeframe === '1d');
            document.getElementById('btn-1h').classList.toggle('active', timeframe === '1h');
            
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            const bust = new Date().getTime();

            // 1. 设置表头
            if (timeframe === '1d') {
                thead.innerHTML = `<tr><th>Asset</th><th>Total Runs</th><th class="long">Long</th><th class="short">Short</th><th class="neutral">Neutral</th><th>Net Score</th></tr>`;
            } else {
                thead.innerHTML = `<tr><th>Asset</th><th>Net Score</th><th>T20 (3D)</th><th>T50 (1W)</th><th>T100 (0.5M)</th><th>T200 (1M)</th></tr>`;
            }
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8">📡 Fetching ${timeframe.toUpperCase()}...</td></tr>`;
            
            // 2. 抓取快照表格数据
            try {
                const response = await fetch(`consensus_${timeframe}.json?t=${bust}`);
                if (!response.ok) throw new Error("Consensus missing");
                const data = await response.json();
                tbody.innerHTML = ''; 
                
                data.signals.forEach(row => {
                    const tr = document.createElement('tr');
                    const scoreClass = row.net_score > 0 ? 'long' : (row.net_score < 0 ? 'short' : 'neutral');
                    const sign = row.net_score > 0 ? '+' : '';
                    
                    if (timeframe === '1d') {
                        const long = row.long_votes || 0;
                        const short = row.short_votes || 0;
                        const neutral = row.neutral_votes !== undefined ? row.neutral_votes : (row.total_runs - long - short);
                        tr.innerHTML = `<td class="font-bold text-white text-base">${row.ticker}</td><td>${row.total_runs}</td><td class="long">${long}</td><td class="short">${short}</td><td class="neutral">${neutral}</td><td><span class="math-box ${scoreClass}">${sign}${row.net_score}</span></td>`;
                    } else {
                        tr.innerHTML = `<td class="font-bold text-white text-base">${row.ticker}</td><td><span class="math-box ${scoreClass}">${sign}${row.net_score}</span></td><td>${cleanStatus(row['3_Day_Momentum_T20'])}</td><td>${cleanStatus(row['1_Week_Structure_T50'])}</td><td>${cleanStatus(row['Half_Month_Institutional_T100'])}</td><td>${cleanStatus(row['1_Month_Macro_T200'])}</td>`;
                    }
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-[#f85149]">Matrix Offline (等待生成 ${timeframe} 数据)</td></tr>`;
            }

            // 3. 抓取历史矩阵数据
            try {
                const histResponse = await fetch(`history_${timeframe}.json?t=${bust}`);
                if (!histResponse.ok) throw new Error("History missing");
                currentHistoryData = await histResponse.json();
                
                renderRotationMatrix();

                const select = document.getElementById('ticker-select');
                const tickers = new Set();
                currentHistoryData.forEach(snap => snap.signals.forEach(sig => tickers.add(sig.ticker)));
                
                select.innerHTML = '';
                if (tickers.size > 0) {
                    Array.from(tickers).sort().forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t; opt.textContent = `🎯 ${t}`;
                        select.appendChild(opt);
                    });
                    renderChart(select.value);
                } else {
                    throw new Error("Empty history");
                }
            } catch (error) {
                // 🛑 核心修复：如果 history_1h 不存在，优雅地隐藏模块，绝不崩溃！
                currentHistoryData = [];
                document.getElementById('ticker-select').innerHTML = '<option value="">📡 等待历史数据累积...</option>';
                if(histogramSeries) histogramSeries.setData([]);
                document.getElementById('rotation-container').classList.add('hidden');
            }
        }

        initChart();
        fetchGlobalTimestamps();
        loadData('1d'); 
    </script>
</body>
</html>
